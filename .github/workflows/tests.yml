name: Test Suite

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rspec:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install all simulator dependencies via rake deps
        run: |
          set -euo pipefail
          bundle exec rake deps:install
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=$HOME/.local/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            lib/rhdl/codegen/netlist/sim/netlist_interpreter -> target
            lib/rhdl/codegen/netlist/sim/netlist_jit -> target
            lib/rhdl/codegen/netlist/sim/netlist_compiler -> target
            lib/rhdl/codegen/ir/sim/ir_interpreter -> target
            lib/rhdl/codegen/ir/sim/ir_jit -> target
            lib/rhdl/codegen/ir/sim/ir_compiler -> target
            examples/mos6502/utilities/simulators/isa_simulator_native -> target

      - name: Build native extensions
        run: |
          set -euo pipefail
          bundle exec rake native:build

      - name: Run test suite (parallel)
        env:
          RSPEC_QUIET_OUTPUT: "1"
        run: bundle exec rake pspec
