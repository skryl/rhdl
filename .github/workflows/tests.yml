name: Test Suite

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rspec:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            verilator \
            iverilog \
            graphviz

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            lib/rhdl/codegen/netlist/sim/netlist_interpreter -> target
            lib/rhdl/codegen/netlist/sim/netlist_jit -> target
            lib/rhdl/codegen/netlist/sim/netlist_compiler -> target
            lib/rhdl/codegen/ir/sim/ir_interpreter -> target
            lib/rhdl/codegen/ir/sim/ir_jit -> target
            lib/rhdl/codegen/ir/sim/ir_compiler -> target
            examples/mos6502/utilities/simulators/isa_simulator_native -> target

      - name: Build native extensions
        run: |
          set -euo pipefail
          bundle exec rake native:build

      - name: Run test suite
        env:
          RSPEC_QUIET_OUTPUT: "1"
        run: bundle exec rake spec
